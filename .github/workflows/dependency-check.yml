name: Dependency Security Audit

on:
  schedule:
    # Weekly on Monday at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - 'package.json'
      - 'yarn.lock'

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16.13.1'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Run yarn audit
        run: yarn audit --level moderate
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: |
          echo "Checking for high severity vulnerabilities..."
          yarn audit --level high --json > audit-results.json 2>&1 || true
          
          # Parse results and create summary
          if [ -f audit-results.json ]; then
            echo "## Audit Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Check if there are high severity issues
            HIGH_COUNT=$(cat audit-results.json | grep -c '"severity":"high"' || echo "0")
            CRITICAL_COUNT=$(cat audit-results.json | grep -c '"severity":"critical"' || echo "0")
            
            echo "- High severity issues: $HIGH_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "- Critical severity issues: $CRITICAL_COUNT" >> $GITHUB_STEP_SUMMARY
            
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo ""
              echo "⚠️ Critical vulnerabilities detected! Please review and update affected packages."
              exit 1
            fi
          fi

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
